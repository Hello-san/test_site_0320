  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #fdf6fa; --charcoal: #2d1f3d; --warm-gray: #9b7fa8;
      --accent: #d46fa0; --purple: #7c4daa; --purple-light: #a87dd4; --white: #ffffff;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Noto Sans JP', sans-serif; background-color: var(--cream); color: var(--charcoal); font-weight: 300; line-height: 1.8; min-height: 100vh; display: flex; flex-direction: column; }
 
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.2rem 2.5rem; background: rgba(253,246,250,0.92);
      backdrop-filter: blur(8px); border-bottom: 1px solid rgba(212,111,160,0.2);
    }
    .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; letter-spacing: 0.08em; color: var(--charcoal); text-decoration: none; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--warm-gray); text-decoration: none; transition: color 0.3s; }
    .nav-links a:hover { color: var(--accent); }
 
    /* MAIN */
    .thanks-wrap {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 8rem 2rem 4rem; text-align: center;
      position: relative; overflow: hidden;
    }
    .thanks-wrap::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 30% 40%, rgba(212,111,160,0.10) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 60%, rgba(124,77,170,0.08) 0%, transparent 55%);
      pointer-events: none;
    }
 
    /* チェックアイコン */
    .check-circle {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, var(--purple) 0%, var(--accent) 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; margin: 0 auto 2rem;
      animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
      box-shadow: 0 8px 32px rgba(212,111,160,0.4);
    }
 
    .thanks-eyebrow {
      font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--purple-light); margin-bottom: 1rem;
      animation: fadeUp 0.6s 0.2s ease both;
    }
    .thanks-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 7vw, 5rem); font-weight: 300;
      line-height: 1.1; color: var(--charcoal); margin-bottom: 1.2rem;
      animation: fadeUp 0.6s 0.3s ease both;
    }
    .thanks-title em { font-style: italic; color: var(--accent); }
    .thanks-sub {
      font-size: 0.88rem; color: var(--warm-gray); max-width: 400px;
      margin: 0 auto 2.5rem; animation: fadeUp 0.6s 0.4s ease both;
    }
 
    /* 注文番号 */
    .order-box {
      background: var(--white); border: 1px solid rgba(212,111,160,0.2);
      padding: 1.5rem 3rem; margin-bottom: 2.5rem;
      animation: fadeUp 0.6s 0.5s ease both;
    }
    .order-label { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--warm-gray); margin-bottom: 0.3rem; }
    .order-number { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 400; color: var(--purple); letter-spacing: 0.1em; }
 
    /* ファネル完了表示 */
    .funnel-complete {
      display: flex; align-items: center; gap: 0;
      margin-bottom: 3rem; flex-wrap: wrap; justify-content: center;
      animation: fadeUp 0.6s 0.6s ease both;
    }
    .funnel-step-done {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0.4rem 0.8rem; color: var(--accent);
    }
    .funnel-step-done .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
    .funnel-step-done.final { font-weight: 500; color: var(--purple); }
    .funnel-step-done.final .dot { background: var(--purple); width: 9px; height: 9px; }
    .funnel-arrow-done { color: rgba(212,111,160,0.5); font-size: 0.8rem; }
 
    .thanks-actions { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; animation: fadeUp 0.6s 0.7s ease both; }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.9rem 2rem; font-family: 'Noto Sans JP', sans-serif; font-size: 0.75rem; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; border: none; cursor: pointer; transition: all 0.3s ease; text-decoration: none; }
    .btn-primary { background: linear-gradient(135deg, var(--purple) 0%, var(--accent) 100%); color: var(--white); }
    .btn-primary:hover { background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 100%); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(212,111,160,0.4); }
    .btn-outline { background: transparent; color: var(--charcoal); border: 1px solid var(--charcoal); }
    .btn-outline:hover { background: var(--charcoal); color: var(--white); transform: translateY(-2px); }
 
    footer { text-align: center; padding: 2rem; font-size: 0.72rem; letter-spacing: 0.1em; color: var(--warm-gray); border-top: 1px solid rgba(212,111,160,0.15); }
 
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes popIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
 
    @media (max-width: 480px) { .nav-links { display: none; } .order-box { padding: 1.2rem 2rem; } }
  </style>
</head>

  </div>
 
  <div class="thanks-actions">
    <a href="shop.html" class="btn btn-primary">引き続きショッピング</a>
    <a href="index.html" class="btn btn-outline">トップへ戻る</a>
  </div>
